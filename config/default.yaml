binance:
  # 注意：这些是默认配置，实际使用的端点和密钥由execution.mode决定
  api_base: https://fapi.binance.com
  ws_base: wss://fstream.binance.com

# 网络请求限流配置（防止触发Binance API限流和IP封禁）
# 参考: Binance Futures /fapi/v1/exchangeInfo rateLimits
#   - REQUEST_WEIGHT: 2400/分钟/IP（按权重，非请求数；account/position 等端点 weight=5）
#   - 多进程共享同一IP且限流器不共享，总请求=各进程之和，需按进程数分摊
#   - 2400 weight / ~7进程 / 平均weight~4 ≈ 85 req/进程/分钟，取 80 留余量
network:
  max_requests_per_second: 3.0
  max_requests_per_minute: 80
  burst_size: 5
  max_ip_ban_wait_seconds: 120  # IP封禁时最大等待秒数，超过则直接抛出避免阻塞（监控90s超时）
  max_minute_limit_wait_seconds: 45  # 分钟级限流等待上限，超过则抛异常避免监控90s超时

  http_timeout: 10.0  # HTTP单次请求超时（秒），缩短以便在90s监控超时内快速失败
  http_max_retries: 2  # HTTP最大重试次数，减少重试避免单请求总耗时超90s
  websocket_reconnect_delay_base: 1.0  # WebSocket重连延迟基数（秒）
  websocket_reconnect_delay_max: 30.0  # WebSocket重连延迟最大值（秒）
  websocket_reconnect_jitter: 0.5  # WebSocket重连抖动（秒）

data:
  universe_update_time: "23:55"
  timezone: UTC
  kline_interval: 5m
  max_history_days: 30
  
  # 数据目录配置（所有目录都基于data_directory，便于统一管理）
  data_directory: data  # 数据根目录
  universe_directory: data/universe  # Universe文件目录
  trades_directory: data/trades  # 逐笔成交数据目录
  klines_directory: data/klines  # K线数据目录
  funding_rates_directory: data/funding_rates  # 资金费率数据目录
  premium_index_directory: data/premium_index  # 溢价指数K线数据目录
  positions_directory: data/positions  # 目标持仓文件目录
  signals_directory: data/signals  # 进程间信号文件目录
  equity_curve_directory: data/equity_curve  # 净值曲线数据目录
  position_history_directory: data/position_history  # 持仓历史数据目录
  strategy_reports_directory: data/strategy_reports  # 策略报告数据目录

  # ===== 回测机主动拉取模式配置 =====
  # 回测机（Windows 10.105.104.107）主动从实盘机器拉取数据，本地对比，不一致则自动修复
  # 使用脚本: scripts/backtest_pull_compare.py
  # 定时任务: scripts/setup_backtest_compare.bat 或 setup_backtest_compare_scheduler.py
  
  # 实盘机器连接信息（回测机需要 SSH 免密登录）
  backtest_pull_live_host: "3.113.21.169"  # 实盘机器 IP/主机名
  backtest_pull_live_user: "ubuntu"  # 实盘机器 SSH 用户名
  
  # 实盘机器上的数据目录路径（Linux 路径）
  backtest_pull_live_klines_dir: "/data/long-short-infra/data/klines"
  backtest_pull_live_funding_rates_dir: "/data/long-short-infra/data/funding_rates"
  backtest_pull_live_premium_index_dir: "/data/long-short-infra/data/premium_index"
  backtest_pull_live_universe_dir: "/data/long-short-infra/data/universe"  # Universe 目录

  # 回测机（本仓库部署在 /mnt/sda/.../LongShort 旁时）：compare / history 脚本写的 JSON 报告目录
  # 与 setup_backtest_compare_scheduler 中 --output-dir 一致
  backtest_compare_output_directory: "/mnt/sda/Simulation/LongShort/compare/backtest_pull"
  # prepare_backtest_history_data 默认落盘行情根目录（与 backtest_pull_data/compare 并列，体量通常在 history/ 下）
  backtest_history_data_root: "/mnt/sda/Simulation/LongShort/backtest_pull_data/history"
  
  # 数据层进程配置
  save_interval: 60  # 定期保存间隔（秒）
  cleanup_interval: 3600  # 数据清理间隔（秒）
  universe_check_interval: 300  # Universe更新检查间隔（秒，5分钟）
  
  # K线聚合器内存限制
  kline_aggregator_max_klines: 8  # 每个symbol最多缓存K线数（需覆盖grace窗口，避免晚到成交回补时丢失基线）
  kline_aggregator_max_pending_windows: 8  # 每个symbol最多保留的pending窗口数（精度优先，配合grace窗口）
  kline_aggregator_max_trades_per_window: 0  # 每窗口成交上限；0表示不截断（保证聚合口径一致）
  # pending窗口内逐笔压缩：超过阈值时把旧逐笔压缩为窗口统计，仅保留尾部逐笔，避免内存线性增长
  kline_aggregator_pending_compact_threshold: 300
  kline_aggregator_pending_compact_keep_tail: 60
  # 按窗口年龄分层压缩（旧窗口更激进；内存高压时会再动态收紧）
  kline_aggregator_pending_compact_old_window_threshold: 120
  kline_aggregator_pending_compact_old_window_keep_tail: 20
  kline_aggregator_pending_compact_current_window_threshold: 260
  kline_aggregator_pending_compact_current_window_keep_tail: 40
  # 周期保存时仅快照最近N个窗口，降低全窗口重聚合导致的RSS缓慢抬升
  kline_snapshot_max_windows_per_symbol: 2
  # 软阈值口径区分：list_total（真实对象内存）与compact_total（压缩统计计数）
  kline_aggregator_pending_compact_trades_soft_limit: 2000000
  kline_close_grace_windows: 2  # 延迟关窗窗口数（允许最近2个窗口接收晚到成交=10分钟）
  
  # DataStorage缓存配置
  storage_schema_cache_max_size: 1  # Schema缓存最大数量
  
  # Trades缓冲区配置（极端优化）
  trades_buffer_max_size: 200  # 每个symbol缓存上限（降低I/O频率，避免逐笔写盘）
  trades_buffer_total_max_size: 80000  # 全局缓存上限（超过阈值会触发主动刷盘）
  
  # 内存清理配置（极端优化：更频繁的清理以确保整套系统内存占用在目标范围内）
  memory_cleanup_interval: 60  # 定期内存清理间隔（秒，1分钟，极端优化：更频繁的清理以控制内存峰值）
  stats_cleanup_interval: 120  # 统计信息清理间隔（秒，2分钟，极端优化：更频繁的清理）
  memory_force_rebuild_interval: 60  # kline全量重建周期（cleanup轮次）。<=0禁用周期重建，仅高增长触发
  memory_aggressive_cleanup_threshold_mb: 900  # 仅当RSS超过此阈值才允许执行激进trim，避免低内存阶段反复重建导致碎片抬升
  
  # ---- 实时标记价格 WebSocket 采集（资金费率 + 溢价指数） ----
  # 通过 !markPrice@arr 流实时接收所有交易对的标记价格/资金费率/指数价格，
  # 与 aggTrade 一样走 WebSocket 推送，不依赖 REST 轮询，不触发 403/429。
  mark_price_update_speed: "3s"  # "3s"（默认，每3秒推送一次）或 "1s"
  mark_price_ping_interval_seconds: 20
  mark_price_ping_timeout_seconds: 30
  mark_price_open_timeout_seconds: 30
  mark_price_max_symbols_per_connection: 80
  mark_price_batch_connect_stagger_seconds: 0.6

  # ---- REST 回填配置（仅启动时一次性拉取历史数据，之后不再轮询） ----
  funding_rate_collect_days: 30  # 启动回填最近N天的资金费率历史
  funding_rate_collect_overlap_minutes: 60
  funding_rate_periodic_lookback_minutes: 480
  premium_index_collect_days: 30  # 启动回填最近N天的溢价指数历史
  premium_index_collect_overlap_minutes: 10
  premium_index_periodic_lookback_minutes: 60
  # REST 回填串行控制（保守参数，避免触发限流）
  history_collect_max_concurrent: 1
  history_collect_batch_size: 8
  
  # 数据完整性检查配置
  completeness_threshold: 1.00  # 数据完整性阈值（90%）- 允许10%的symbol因网络抖动暂缺
  data_complete_retry_throttle: 10.0  # data_complete重试节流时间（秒）
  data_complete_retry_attempts: 3  # data_complete重试次数
  data_complete_retry_delays: [0.05, 0.2, 0.5]  # data_complete重试延迟（秒）
  incomplete_symbols_log_interval: 5.0  # 不完整symbol日志记录间隔（秒）
  strict_data_completeness: true  # 严格完整性：币种覆盖必须与universe一致
  strict_funding_min_points_3d: 9  # 最近3天资金费率最小条数（3天*每天3次）
  strict_premium_min_points_3d: 864  # 参考：3天*288（周期完整性已与 klines 对齐为24h窗口）
  strict_premium_min_points_24h: 288  # 溢价指数周期完整性：与 klines 相同窗口（最近24h已结算5m）
  premium_min_points_24h: 288  # 非 strict 模式下溢价 24h 最小根数
  strict_kline_min_points_24h: 288  # 最近24小时5min K线最小条数（严格288）

  # 官方K线对齐（默认关闭；优先修复聚合链路本身）
  kline_reconcile_enabled: false
  kline_reconcile_workers: 4
  kline_reconcile_queue_maxsize: 20000
  kline_reconcile_timeout_seconds: 10.0
  # trades缓冲压力检查节流（秒），避免高频全量排序导致吞吐下降
  trades_buffer_pressure_check_interval: 1.0
  # 采集器并发与分流配置（提升高并发场景下稳定性）
  collector_callback_workers: 24
  collector_max_symbols_per_connection: 35
  collector_ping_interval_seconds: 20
  collector_ping_timeout_seconds: 35
  collector_open_timeout_seconds: 30
  collector_ping_interval_jitter_seconds: 2.5
  collector_batch_connect_stagger_seconds: 0.6
  collector_recover_on_reconnect: false
  collector_recover_max_pages: 1
  collector_recover_page_limit: 200
  collector_recover_max_trades_per_reconnect: 400
  collector_recover_max_requests_per_minute: 20
  collector_recover_active_window_seconds: 90
  collector_recover_max_symbols_per_reconnect: 8
  collector_recover_symbol_request_delay_ms: 120
  # 实时检测aggTrade ID缺口并受控补缺（精度优先，仍走全局限流）
  collector_gap_recover_enabled: true
  collector_gap_recover_max_trades: 3000
  collector_gap_recover_page_limit: 1000
  collector_gap_recover_cooldown_seconds: 15.0
  collector_gap_recover_global_budget_per_minute: 15000
  collector_recent_agg_id_cache_size: 500
  
  # Tran_stats阈值配置（人民币）
  tran_stats_tier1_threshold_rmb: 40000  # 第一档阈值（人民币）
  tran_stats_tier2_threshold_rmb: 200000  # 第二档阈值（人民币）
  tran_stats_tier3_threshold_rmb: 1000000  # 第三档阈值（人民币）
  usd_rmb_rate: 7.0  # 美元对人民币汇率
  
  # 数据API缓存配置
  cache_max_symbols: 1  # 内存缓存最多保留的symbol数量（只缓存最活跃的1个symbol）
  cache_max_klines: 1 # 缓存最大K线数
  # DataStorage.load_klines 按 (symbol,start,end) 进程内 LRU；多回测同区间复用，减轻并发读盘
  klines_load_cache_max_entries: 64

strategy:
  history_days: 30
  calculation_interval: 5m
  
  # Alpha引擎配置
  alpha:
    # 并发模式：thread（线程池，默认，Windows友好）| process（进程池，CPU密集型）| none（串行，用于调试）
    concurrency: thread
    # 最大并发数（默认等于calculators数量，可根据CPU核心数调整）
    max_workers: null  # null表示自动设置为calculators数量
    # 实盘每轮 Alpha 结果追加 JSONL，与回测 alpha_records 格式对齐便于对账
    persist_enabled: true
    persist_directory: data/alpha_snapshots/live
  
  # 策略进程配置
  process:
    trigger_wait_timeout: 300.0  # 触发文件等待超时（秒）
    trigger_wait_interval: 1.0  # 触发文件检查间隔（秒）
    trigger_file_max_retries: 3  # 触发文件读取最大重试次数
    trigger_file_retry_delay: 0.5  # 触发文件重试延迟（秒）
    run_waiting_timeout: 3600.0  # 运行等待模式超时（秒）
  
  # Calculator（因子）配置
  calculators:
    # 如果配置了enabled列表，只加载列表中的calculators
    # 如果未配置或为空，则自动发现calculators目录下的所有calculators
    # 支持格式：
    #   - "模块名" (如 "mean_buy_dolvol4_over_dolvol_rank")
    #   - "完整模块路径" (如 "src.strategy.calculators.researcher1_factor1")
    enabled:
    #  - "mean_buy_dolvol4_over_dolvol_rank"
    # calculator权重（未配置时默认1.0）
    # 写法示例：
    # weights:
    #   mean_buy_dolvol4_over_dolvol_rank: 0.03
    #   some_other_calculator: 0.12
    # 计算时会先按各calculator权重加权求和，再做统一归一化
    weights: {}
  
  # 回测系统配置
  backtest:
    # 组合配置
    portfolio:
      available_balance_ratio: 0.5  # 可用余额比例（用于计算available_balance）
    
    # 指标计算配置
    metrics:
      trading_days_per_year: 252  # 每年交易日数（用于年化计算）
    
    # 执行配置
    execution:
      progress_log_interval: 1000  # 进度日志输出间隔（步数）
    
    # 输出配置
    output:
      result_dir: data/backtest_results  # 回测结果输出目录
      save_json: true  # 是否保存JSON格式结果
      save_csv: true  # 是否保存CSV格式结果（trades和portfolio）
      save_report: true  # 是否保存文本报告
      save_config: true  # 是否保存配置文件

execution:
  # 执行模式: 'testnet' (测试网), 'mock' (模拟), 'live' (实盘)
  mode: live  # 可选: testnet, mock, live
  
  # dry-run开关：所有模式都可以启用dry-run
  # 启用后，即使使用真实API，也不会产生真实订单（使用test_order endpoint）
  # 注意：testnet模式下，dry_run=false会使用真实testnet API，但不会产生真实订单（testnet本身就是测试环境）
  dry_run: true  # true: 启用dry-run（不产生真实订单）, false: 正常模式（可能产生真实订单）
  
  # 合约交易配置（所有模式共用）
  contract_settings:
    margin_type: CROSSED      # 保证金模式: CROSSED (全仓) 或 ISOLATED (逐仓)
    position_mode: one_way    # 持仓模式: one_way (单向持仓) 或 dual_side (双向持仓)
    allow_single_order_reverse: true  # 单向持仓下允许一笔订单直接翻仓
    leverage: 20              # 杠杆倍数: 1-125
  # 账户级杠杆（可选）
  # 写法示例：
  # account_leverage:
  #   account1: 1.0
  #   account2: 2.0
  # 仓位换算使用公式：qty = M * account_leverage * alpha / price
  # 其中 M = 账户总资产(totalWalletBalance)，不是availableBalance
  account_leverage: {}
  
  # 订单执行配置
  order:
    max_concurrent: 5  # 最大并发订单数
    monitor_interval: 2.0  # 订单监控检查间隔（秒）
    monitor_timeout: 30.0  # 订单监控超时（秒）
    position_diff_threshold: 0.00001  # 持仓偏差阈值（小于此值不调整）
    default_tick_size: 0.01  # 默认价格精度
    default_step_size: 0.01  # 默认数量精度
    default_min_qty: 0.001  # 默认最小数量
    default_min_notional: 5.0  # 默认最小订单金额（USDT）
  
  # OrderManager缓存配置
  order_manager:
    completed_orders_max_size: 1000  # 已完成订单缓存最大数量（防止内存无限增长）
    symbol_info_cache_max_size: 500  # Symbol信息缓存最大数量（LRU清理）
  
  # BinanceClient配置
  binance_client:
    contract_settings_cache_max_size: 500  # 合约设置缓存最大数量
    contract_settings_cache_ttl: 3600  # 合约设置缓存过期时间（秒，默认1小时）
    recv_window_ms: 120000  # 接收窗口（毫秒），增大以容忍时钟偏差，减少 -1021 错误
    server_time_sync_ttl_seconds: 3600  # 服务器时间同步TTL（秒），缩短以更频繁对时
  
  # TWAP/VWAP订单配置
  twap:
    default_duration_minutes: 60  # 默认执行时长（分钟）
    max_splits: null  # 最大分割数（null表示不限制）
  
  vwap:
    default_duration_minutes: 60  # 默认执行时长（分钟）
    lookback_days: 5  # 历史数据回看天数
    max_splits: 60  # 最大分割数

  # ===== 动态选择订单执行方式配置 =====
  # 动态选择执行方式（MARKET/LIMIT/TWAP/VWAP，内部开关会回退至market，如果有历史成交量数据时优先使用vwap）
  method_selection:
    enabled: false  # 是否启用动态选择执行方式
    default_method: MARKET  # 默认执行方式（当动态选择禁用时使用）
    
    # 阈值配置（所有百分比值为小数，如0.05表示5%）
    thresholds:
      # 小订单：金额占账户权益比例 <= 此值，使用LIMIT
      small_order_notional_pct_equity: 0.001  # 0.1% of equity
      # 大订单：金额占账户权益比例 >= 此值，使用TWAP/VWAP
      large_order_notional_pct_equity: 0.05  # 5% of equity
      # 高波动：波动率 >= 此值，使用TWAP/VWAP
      high_volatility_pct: 0.03  # 日波动率3%
      # 高流动性冲击：冲击比例 >= 此值，使用TWAP/VWAP
      high_liquidity_impact_pct: 0.01  # 1% liquidity impact
      # 低可用余额：可用余额比例 <= 此值且reduce_only，使用MARKET快速平仓
      low_available_balance_pct: 0.1  # 10% available balance
    
    # 各执行方式的启用/禁用配置
    limit:
      enabled: true  # 启用LIMIT（适合小订单，获取更好价格）
      price_offset_pct: 0.001  # LIMIT价格偏移百分比（BUY时设置在当前价格下方0.1%，SELL时设置在上方0.1%）
      max_wait_seconds: 60  # LIMIT订单最大等待时间（秒），超时后自动撤单并使用fallback执行
      fallback_method: MARKET  # LIMIT订单超时后的备选执行方式（MARKET/TWAP/VWAP）
    vwap:
      enabled: true  # 启用VWAP（适合大订单，利用成交量分布）
    twap:
      enabled: true  # 启用TWAP（适合大订单，分散执行时间）
    
    # 特征计算配置（用于动态选择执行方式）
    features:
      lookback_days: 5  # 回看天数（用于计算历史特征）
      min_bars: 288  # 最小K线数量（用于计算波动率等特征，288 = 1天的5分钟K线）
    
    # 风险控制：达到阈值时取消所有订单并停止
    risk_control:
      enabled: false  # 是否启用风险控制（默认关闭）
      min_data_points: 100  # 最少数据点数（避免早期误判）
      stop_loss_max_drawdown_pct: 0.15  # 最大回撤阈值（达到此值取消所有订单并停止）
      take_profit_total_return_pct: 0.3  # 止盈总收益率（达到此值取消所有订单并获利了结）
      feishu_webhook: ""  # 飞书机器人webhook（留空则不发送）
  
  # ===== testnet模式配置 =====
  # 仅在 mode=testnet 时使用
  # 使用Binance测试网环境，需要testnet API密钥
  testnet:
    api_base: https://testnet.binancefuture.com  # 测试网REST API地址
    ws_base: wss://stream.binancefuture.com       # 测试网WebSocket地址
    # 测试网账户配置（支持多账户，每个账户需要自己的testnet API密钥）
    # 注意：如果配置了account_id，必须同时配置api_key和api_secret，否则该账户不会被启动
    # 如果不需要某个账户，请注释掉整个账户配置块
    accounts:
      - account_id: account1
        # 优先级：环境变量 {ACCOUNT_ID}_TESTNET_API_KEY/SECRET > 配置文件
        # 环境变量示例：ACCOUNT1_TESTNET_API_KEY, ACCOUNT1_TESTNET_API_SECRET
        api_key: your_account1_testnet_api_key_here
        api_secret: your_account1_testnet_api_secret_here
      # 以下账户配置不完整，不会被启动。如需启用，请取消注释并填写API密钥
      # - account_id: account2
      #   api_key: your_account2_testnet_api_key_here
      #   api_secret: your_account2_testnet_api_secret_here
      # - account_id: account3
      #   api_key: your_account3_testnet_api_key_here
      #   api_secret: your_account3_testnet_api_secret_here
  
  # ===== mock模式配置 =====
  # 仅在 mode=mock 时使用
  # 使用模拟端点和模拟账户信息，不需要真实API密钥
  mock:
    api_base: https://mock.binance.com  # 模拟API地址（实际不会连接，仅用于标识）
    ws_base: wss://mock.binance.com      # 模拟WebSocket地址（实际不会连接，仅用于标识）
    # 模拟账户配置（支持多账户，每个账户有模拟的账户信息）
    accounts:
      - account_id: account1
        total_wallet_balance: 100000.0  # 总钱包余额（USDT）
        available_balance: 50000.0     # 可用余额（USDT）
        initial_positions: []           # 初始持仓列表，格式: [{"symbol": "BTCUSDT", "position_amt": 0.1, "entry_price": 50000.0}]
      - account_id: account2
        total_wallet_balance: 200000.0
        available_balance: 100000.0
        initial_positions: []
      - account_id: account3
        total_wallet_balance: 150000.0
        available_balance: 75000.0
        initial_positions: []
  
  # ===== live模式配置 =====
  # 仅在 mode=live 时使用
  # 使用Binance实盘环境，需要真实API密钥（⚠️ 会产生真实订单和真实交易）
  live:
    api_base: https://fapi.binance.com  # 实盘REST API地址
    ws_base: wss://fstream.binance.com   # 实盘WebSocket地址
    # 实盘账户配置（支持多账户，每个账户需要自己的真实API密钥）
    # 注意：如果配置了account_id，必须同时配置api_key和api_secret，否则该账户不会被启动
    # 如果不需要某个账户，请注释掉整个账户配置块
    accounts:
      - account_id: account1
        # 优先级：环境变量 {ACCOUNT_ID}_API_KEY/SECRET > 配置文件
        # 环境变量示例：ACCOUNT1_API_KEY, ACCOUNT1_API_SECRET
        api_key: your_account1_api_key_here
        api_secret: your_account1_api_secret_here
      # 以下账户配置不完整，不会被启动。如需启用，请取消注释并填写API密钥
      # - account_id: account2
      #   api_key: your_account2_api_key_here
      #   api_secret: your_account2_api_secret_here
      # - account_id: account3
      #   api_key: your_account3_api_key_here
      #   api_secret: your_account3_api_secret_here

monitoring:
  check_interval: 60
  account_fetch_timeout: 150  # 单账户监控超时（秒，适当放宽以容忍网络抖动）
  # 监控轮次内相邻 Binance API 调用的最小间隔（秒），避免瞬时突发加重限流
  binance_request_spacing_seconds: 0.5

  # WebSocket 数据源（替代 REST 轮询，减少限流）
  use_websocket: true  # 启用时：价格用 !markPrice@arr，账户/持仓用 User Data Stream
  mark_price_update_speed: "3s"  # "3s" 或 "1s"
  mark_price_ping_interval_seconds: 20
  mark_price_ping_timeout_seconds: 30
  mark_price_open_timeout_seconds: 30
  account_stream_keepalive_minutes: 30  # listenKey 保活间隔
  account_stream_ping_interval_seconds: 20
  account_stream_ping_timeout_seconds: 30
  account_stream_open_timeout_seconds: 30

  # Equity Curve内存限制
  equity_curve_max_cache: 10000  # Equity Curve内存缓存最大记录数（默认10000条，约7小时）
  position_history_limit: 500  # 持仓历史数据内存缓存最大记录数（默认500条）
  # 性能监控配置
  performance:
    enabled: true  # 是否启用性能监控（默认关闭，避免生产环境性能影响）
    output_directory: data/performance  # 性能数据输出目录
    max_rounds_in_memory: 100  # 内存中最多保留的轮次数
    round_age_limit_seconds: 3600  # 轮次过期时间（秒）
    auto_cleanup_interval: 300  # 自动清理间隔（秒）
    
    # 性能告警阈值
    performance_alerts:
      enabled: false
      thresholds:
        'execution/target_positions_loading': 2.0          # 目标持仓加载 > 2秒告警
        'execution/positions_execution': 10.0              # 头寸执行 > 10秒告警
        'execution/orders_monitoring': 30.0                # 订单监控 > 30秒告警
        'event_coordinator/message_handling': 0.5          # 消息处理 > 0.5秒告警
        'event_coordinator/strategy_notification': 1.0     # 策略通知 > 1秒告警
        'monitoring/account_monitoring': 5.0               # 账户监控 > 5秒告警
        'monitoring/account_info_fetch': 3.0               # 账户信息获取 > 3秒告警
        'monitoring/metrics_calculation': 2.0              # 指标计算 > 2秒告警
        'monitoring/alert_check': 1.0                      # 告警检查 > 1秒告警
        'alpha_engine/calculators_execution': 15.0         # 计算器执行 > 15秒告警
  
  alert_thresholds:
    # 持仓偏差告警阈值
    position_deviation: 0.05  # 平均持仓偏差阈值（默认5%）
    max_deviation_multiplier: 2.0  # 最大偏差倍数（默认2倍，即最大偏差 = position_deviation * 2）
    
    # 敞口告警阈值
    max_exposure: 1000000  # 最大总敞口（默认100万USDT）
    net_exposure_ratio: 0.8  # 净敞口比例阈值（默认80%，超过此值会告警）
    
    # 账户健康度告警阈值
    min_available_ratio: 0.1  # 最小可用余额比例（默认10%，低于此值会告警）
    max_unrealized_loss_ratio: 0.1  # 最大未实现亏损比例（默认10%，超过此值会告警）
    max_utilization: 110.0  # 最大账户利用率（默认110%，超过此值会告警）
    # 说明：在杠杆交易中（20倍杠杆），账户利用率可能略高于100%是正常的
    # 110%的阈值允许正常的杠杆使用，同时仍能检测异常高的利用率（如超过150%）

ipc:
  socket_type: tcp
  tcp_host: 127.0.0.1
  tcp_port: 8888
  socket_path: /tmp/binance_quant.sock
  # 事件协调进程配置
  signal_file_max_retries: 10  # 信号文件写入最大重试次数
  signal_file_retry_delay_base: 0.05  # 信号文件重试延迟基数（秒）
  signal_file_retry_delay_max: 1.0  # 信号文件重试延迟最大值（秒）

logging:
  level: INFO
  log_directory: logs
  log_file: binance_quant.log
  max_bytes: 10485760
  backup_count: 7

# 存储配置
storage:
  max_retries: 3  # 存储操作最大重试次数
  retry_delay: 0.5  # 存储重试延迟（秒）
  retry_delay_multiplier: 2.0  # 重试延迟倍数（指数退避）
